<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antkownia GG MC</title>

</body>
</html>
<style>
body {
    margin: 0;
    font-family: 'Ink Free', sans-serif;
    background: #000000;
    color: white;
    text-align: center;
}

/* 🌈 NEON HEADER */
@keyframes neonMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    padding: 60px 20px;
    background: linear-gradient(270deg,
        #00ffff,
        #ff00ff,
        #00ff66,
        #ffcc00,
        #00ffff
    );
    background-size: 1000% 1000%;
    animation: neonMove 18s ease infinite;
    box-shadow: 0 0 40px #0ff;
}

h1 {
    font-size: 55px;
    text-shadow: 0 0 10px #0ff, 0 0 30px #f0f, 0 0 60px #0ff;
    margin: 0;
}

.server-ip {
    margin-top: 10px;
    font-size: 18px;
    color: #000;
    font-weight: bold;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    border: 2px solid #0ff;
    color: #0ff;
    text-decoration: none;
    border-radius: 10px;
    box-shadow: 0 0 10px #0ff;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover {
    background: #0ff;
    color: black;
    box-shadow: 0 0 25px #0ff;
}

section {
    padding: 40px;
}

.server-img {
    width: 70%;
    max-width: 650px;
    border-radius: 15px;
    box-shadow: 0 0 30px #0ff;
}

footer {
    margin-top: 40px;
    padding: 20px;
    color: gray;
    font-size: 14px;
}

.small {
    font-size: 12px;
    color: #777;
}

/* INFO BOX */
.ip-box {
    margin-top: 15px;
}
</style>
</head>

<body>

<header>
    <h1>⚡ ANTKOWNIA GG ⚡</h1>
    <div class="server-ip">
        IP: antkowniaGG.ddns.net | Minecraft 1.21.4 | SURVIVAL
    </div>

    <div class="ip-box">
        <button class="btn" onclick="copyIP()">📋 Kopiuj IP</button>
        <p id="copyText" class="small"></p>
    </div>
</header>

<section>
    <h2>🔥 Tryb Serwera</h2>
    <p>Survival</p>

    <img class="server-img" src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png" alt="server">
</section>

<section>
    <h2>🌐 Linki</h2>

    <a class="btn" href="https://cat-bounce.com" target="_blank">Discord</a>
    <a class="btn" href="https://www.tiktok.com/@elektroantek" target="_blank">TikTok</a>
    <a class="btn" href="https://www.youtube.com/@Antgg-i4t" target="_blank">YouTube</a>
</section>

<section>
    <h2>historia serwera</h2>
<footer>
<p>© 2026 Antkownia GG. Wszelkie prawa zastrzeżone.</p>
<a href="https://youtu.be/hSN6-AMdDOo?si=uzdRvOy4jJmGEV8F">dla niekumających nie można podrabiać strony</a>
</footer>

<script>
function copyIP() {
    const ip = "antkowniaGG.ddns.net";

    navigator.clipboard.writeText(ip).then(() => {
        document.getElementById("copyText").innerText = "✔ IP skopiowane!";
    }).catch(() => {
        document.getElementById("copyText").innerText = "❌ Nie udało się skopiować";
    });
}
</script>
<script>
let clicks = 0;

document.addEventListener("click", () => {
    clicks++;

    if (clicks === 6) {
        alert("chcesz klucze? /egg ");
    }
});
</script>
</body>
</html>
